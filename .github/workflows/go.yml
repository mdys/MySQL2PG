name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ===== Unit Tests =====
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build -v ./...

      - name: Test
        run: |
          echo "Running tests with race detector..."
          
          # Run tests for each package separately to avoid coverage profile issues
          echo "Testing internal/config..."
          go test -v -race -coverprofile=coverage.out ./internal/config/...
          
          echo "Testing internal/converter/postgres..."
          go test -v -race -coverprofile=coverage.out.tmp ./internal/converter/postgres/...
          cat coverage.out.tmp >> coverage.out
          rm coverage.out.tmp
          
          echo "Testing internal/postgres..."
          go test -v -race -coverprofile=coverage.out.tmp ./internal/postgres/...
          cat coverage.out.tmp >> coverage.out
          rm coverage.out.tmp
          
          echo "Testing internal/report..."
          go test -v -race -coverprofile=coverage.out.tmp ./internal/report/...
          cat coverage.out.tmp >> coverage.out
          rm coverage.out.tmp
          
          echo "All tests completed successfully"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  # ===== Integration Tests =====
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -prootpassword --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Setup test database schema
        env:
          MYSQL_PWD: rootpassword
        run: |
          mysql -h 127.0.0.1 -u root test_db < scripts/mysql/create_table.sql
          mysql -h 127.0.0.1 -u root test_db < scripts/mysql/create_index.sql
          mysql -h 127.0.0.1 -u root test_db < scripts/mysql/create_view.sql
          mysql -h 127.0.0.1 -u root test_db < scripts/mysql/create_function.sql
          mysql -h 127.0.0.1 -u root test_db < scripts/mysql/create_user.sql

      - name: Create test config
        run: |
          cat > config.yml << 'EOF'
          mysql:
            host: 127.0.0.1
            port: 3306
            username: root
            password: rootpassword
            database: test_db
            test_only: false
            max_open_conns: 100
            max_idle_conns: 50
            conn_max_lifetime: 3600
            connection_params: charset=utf8mb4&parseTime=false&interpolateParams=true

          postgresql:
            host: localhost
            port: 5432
            username: postgres
            password: postgrespassword
            database: test_db
            test_only: false
            max_conns: 50
            pg_connection_params: search_path=public connect_timeout=300 statement_timeout=0

          conversion:
            options:
              tableddl: true
              data: true
              view: false
              indexes: true
              functions: false
              users: true
              table_privileges: true
              lowercase_columns: true
              skip_existing_tables: false
              validate_data: true
              truncate_before_sync: false
              use_table_list: false
              table_list: []
              exclude_use_table_list: true
              exclude_table_list: [case_45_stored_generated,case_59_complex_generated]
              exclude_use_view_list: false
              exclude_view_list: []
              exclude_use_function_list: false
              exclude_function_list: []
            limits:
              concurrency: 10
              bandwidth_mbps: 100
              max_ddl_per_batch: 10
              max_functions_per_batch: 5
              max_indexes_per_batch: 20
              max_users_per_batch: 10
              max_rows_per_batch: 50000
              batch_insert_size: 50000

          run:
            show_progress: true
            error_log_path: ./errors.log
            enable_file_logging: true
            log_file_path: ./conversion.log
            show_console_logs: false
            show_log_in_console: false
          EOF

      - name: Run MySQL2PG
        run: |
          go build -o mysql2pg ./cmd/
          ./mysql2pg -c config.yml

      - name: Upload integration test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            conversion.log
            errors.log
